services:
  civil3d-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: civil3d-mcp:dev
    volumes:
      - ./src:/app/src:ro
      - ./build:/app/build
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
    environment:
      CIVIL3D_HOST: ${CIVIL3D_HOST:-host.docker.internal}
      CIVIL3D_PORT: ${CIVIL3D_PORT:-8080}
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_HOST: "0.0.0.0"
      CIVIL3D_LOG_LEVEL: ${CIVIL3D_LOG_LEVEL:-debug}
    ports:
      - "${MCP_HTTP_PORT:-3000}:3000"
    stdin_open: true
    tty: true
    # Hot-reload: tsc --watch rebuilds on src changes; nodemon restarts the server
    entrypoint:
      - sh
      - -c
      - |
        npm ci
        npx tsc --watch &
        npx nodemon --watch build --ext js build/index.js
